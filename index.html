<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balloon Pop Party!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            min-height: 100vh;
            overflow: hidden;
            cursor: crosshair;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            color: #FF6B6B;
            text-shadow: 3px 3px 0 #FFF;
            z-index: 100;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            color: #4ECDC4;
            text-shadow: 2px 2px 0 #FFF;
            z-index: 100;
        }
        .balloon {
            position: absolute;
            width: 80px;
            height: 100px;
            border-radius: 50% 50% 50% 50%;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.1);
        }
        .balloon::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 30px;
            background: #888;
        }
        .balloon:hover { transform: scale(1.1); }
        .balloon.pop { animation: pop 0.3s ease-out forwards; }
        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.8; }
            100% { transform: scale(0); opacity: 0; }
        }
        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
        }
        .cloud {
            position: absolute;
            background: white;
            border-radius: 100px;
            opacity: 0.8;
        }
        #start-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        #start-screen h1 {
            font-size: 64px;
            color: #FFD93D;
            text-shadow: 4px 4px 0 #FF6B6B;
            margin-bottom: 20px;
        }
        #start-btn {
            font-size: 36px;
            padding: 20px 60px;
            background: #FF6B6B;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #D94343;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        #start-btn:hover {
            transform: translateY(2px);
            box-shadow: 0 6px 0 #D94343;
        }
        #start-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #D94343;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="score">🎈 0</div>
        <div id="instructions">Click the balloons to pop them!</div>
        <div id="start-screen">
            <h1>🎈 Balloon Pop Party! 🎈</h1>
            <button id="start-btn">START PLAYING!</button>
        </div>
    </div>
    <script>
        const gameContainer = document.getElementById('game-container');
        const scoreDisplay = document.getElementById('score');
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        let score = 0;
        let gameRunning = false;
        let spawnInterval;
        const colors = ['#FF6B6B', '#4ECDC4', '#FFD93D', '#95E1D3', '#F38181', '#AA96DA', '#FCBAD3'];
        
        function createClouds() {
            for (let i = 0; i < 5; i++) {
                const cloud = document.createElement('div');
                cloud.className = 'cloud';
                cloud.style.width = (100 + Math.random() * 100) + 'px';
                cloud.style.height = (40 + Math.random() * 40) + 'px';
                cloud.style.left = Math.random() * window.innerWidth + 'px';
                cloud.style.top = (Math.random() * 200) + 'px';
                gameContainer.appendChild(cloud);
            }
        }
        
        function createBalloon() {
            if (!gameRunning) return;
            const balloon = document.createElement('div');
            balloon.className = 'balloon';
            balloon.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            balloon.style.left = (Math.random() * (window.innerWidth - 100) + 50) + 'px';
            balloon.style.bottom = '-120px';
            const speed = 2 + Math.random() * 2 + (score * 0.1);
            let position = -120;
            balloon.addEventListener('click', (e) => {
                e.stopPropagation();
                popBalloon(balloon, e.clientX, e.clientY);
            });
            gameContainer.appendChild(balloon);
            const floatInterval = setInterval(() => {
                if (!gameRunning) { clearInterval(floatInterval); return; }
                position += speed;
                balloon.style.bottom = position + 'px';
                if (position > window.innerHeight + 120) {
                    clearInterval(floatInterval);
                    balloon.remove();
                }
            }, 20);
            balloon.dataset.interval = floatInterval;
        }
        
        function popBalloon(balloon, x, y) {
            if (balloon.classList.contains('pop')) return;
            balloon.classList.add('pop');
            clearInterval(balloon.dataset.interval);
            score++;
            scoreDisplay.textContent = '🎈 ' + score;
            const color = balloon.style.backgroundColor;
            for (let i = 0; i < 8; i++) createParticle(x, y, color);
            setTimeout(() => balloon.remove(), 300);
        }
        
        function createParticle(x, y, color) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.backgroundColor = color;
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            gameContainer.appendChild(particle);
            const angle = Math.random() * Math.PI * 2;
            const velocity = 5 + Math.random() * 5;
            let vx = Math.cos(angle) * velocity;
            let vy = Math.sin(angle) * velocity;
            let px = x, py = y;
            const particleInterval = setInterval(() => {
                vx *= 0.95; vy += 0.5;
                px += vx; py += vy;
                particle.style.left = px + 'px';
                particle.style.top = py + 'px';
                particle.style.opacity = parseFloat(particle.style.opacity || 1) - 0.02;
                if (particle.style.opacity <= 0) {
                    clearInterval(particleInterval);
                    particle.remove();
                }
            }, 20);
        }
        
        function startGame() {
            startScreen.style.display = 'none';
            gameRunning = true;
            score = 0;
            scoreDisplay.textContent = '🎈 0';
            spawnInterval = setInterval(createBalloon, 1000);
        }
        startBtn.addEventListener('click', startGame);
        createClouds();
    </script>
</body>
</html>
